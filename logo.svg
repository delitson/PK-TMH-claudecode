<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" fill="none">
  <!-- Green rounded card -->
  <rect x="2" y="18" width="74" height="90" rx="9" fill="#0F8E78"/>

  <!-- Inner mint shape (gợi hình họng/răng) -->
  <path d="M22 40 Q22 33 30 33 L48 33 Q56 33 56 43 L56 70 Q56 84 42 88 L30 88 Q22 88 22 80 Z" fill="#5BCDB0"/>

  <!-- Ear (white) -->
  <path d="M14 46 Q9 46 9 53 Q9 62 15 64 Q17 60 14 56 Q18 52 14 48 Z" fill="#ffffff"/>
  <path d="M13 53 Q12 51 13.5 49.5" stroke="#0F8E78" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- Face profile silhouette (forehead, nose, lips, chin) -->
  <path d="M28 30
           Q40 30 40 42
           Q34 42 36 50
           L40 52
           Q34 54 38 60
           Q34 62 38 67
           Q34 71 38 76
           L36 100
           L28 100 Z" fill="#ffffff"/>

  <!-- Medical Cross (plus) at top, partly outside -->
  <g transform="translate(54, -2)">
    <rect x="13" y="0" width="14" height="36" rx="2.5" fill="#0F8E78"/>
    <rect x="2" y="11" width="36" height="14" rx="2.5" fill="#0F8E78"/>
  </g>
</svg>
